# Supabase local development configuration.
# Reference: https://supabase.com/docs/guides/cli/config

project_id = "multitenant-template"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://acme.tuapp.local:3000"
additional_redirect_urls = [
  "http://acme.tuapp.local:3000/auth/callback",
  "http://*.tuapp.local:3000/auth/callback",
  "http://localhost:3000/auth/callback"
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # For local dev: skip email confirmation
secure_password_change = false

# Magic link templates. Customize for your brand in production.
[auth.email.template.magic_link]
subject = "Sign in to {{ .SiteURL }}"
content_path = "./supabase/templates/magic_link.html"

[edge_runtime]
enabled = true
policy = "oneshot"

[experimental]
orioledb_version = ""